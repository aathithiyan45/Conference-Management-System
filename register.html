<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConferenceHub — Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">CONFERENCEHUB</div>
        <h2>Create Account</h2>
        <p class="subtitle">Join ConferenceHub to manage or attend events.</p>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Jane Smith">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="role">
                <option value="Admin">Admin</option>
                <option value="Speaker">Speaker</option>
                <option value="Attendee" selected>Attendee</option>
            </select>
        </div>

        <button onclick="registerUser()" style="width:100%;justify-content:center;margin-top:4px;">Create Account →</button>

        <p style="margin-top:20px;font-size:14px;color:var(--text-muted);text-align:center;">
            Already have an account? <a href="index.html">Sign in</a>
        </p>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
