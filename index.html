<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConferenceHub — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">CONFERENCEHUB</div>
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue.</p>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button onclick="loginUser()" style="width:100%;justify-content:center;margin-top:4px;">Sign In →</button>

        <p style="margin-top:20px;font-size:14px;color:var(--text-muted);text-align:center;">
            Don't have an account? <a href="register.html">Create one</a>
        </p>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
